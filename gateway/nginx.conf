server {
    listen 80;

    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://172.19.0.3:8000/api/;
    }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://172.19.0.3:8000/admin/;
    }

    location /static/ {
        alias /staticfiles/static/;
    }

    location / {
        proxy_pass http://172.19.0.2:8000/;
        proxy_set_header Host $host;
    }
}
